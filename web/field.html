<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>S.C.L.I.D AI — Field Marshall (Dark Mode)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-black text-emerald-400 min-h-screen font-['JetBrains_Mono'] selection:bg-emerald-500 selection:text-black">

  <!-- Scanline Overlay -->
  <div class="fixed inset-0 pointer-events-none z-50 bg-[linear-gradient(rgba(18,16,16,0)_50%,rgba(0,0,0,0.25)_50%),linear-gradient(90deg,rgba(255,0,0,0.04),rgba(0,255,0,0.02),rgba(0,0,118,0.04))] bg-[length:100%_2px,3px_100%] opacity-15"></div>

  <!-- CRT Vignette -->
  <div class="fixed inset-0 pointer-events-none z-40" style="background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.6) 100%);"></div>

  <div class="h-full flex flex-col p-4 max-w-lg mx-auto border-x border-emerald-900/30 relative z-10">

    <!-- Header -->
    <header class="flex justify-between items-center mb-5 border-b border-emerald-900/40 pb-3">
      <div>
        <div class="text-[8px] font-bold tracking-[0.4em] text-emerald-700 uppercase">S.C.L.I.D AI — TAC-UNIT / F-101</div>
        <div class="text-[11px] font-bold text-emerald-400 mt-0.5">LOCATION: KRYPTON SECTOR 7</div>
      </div>
      <div class="flex items-center gap-2">
        <div id="statusDot" class="w-2 h-2 rounded-full bg-emerald-400 shadow-[0_0_8px_#10B981] animate-pulse"></div>
        <span class="text-[8px] text-emerald-600 uppercase tracking-widest">DARK MODE</span>
      </div>
    </header>

    <div class="flex-1 flex flex-col space-y-4 overflow-hidden">

      <!-- Network Status -->
      <div class="grid grid-cols-2 gap-3">
        <div class="p-2.5 bg-red-950/15 border border-red-900/30 rounded-lg flex flex-col">
          <span class="text-[7px] text-red-800 uppercase tracking-[0.2em]">Cellular Uplink</span>
          <span class="text-[9px] text-red-500 font-bold uppercase mt-0.5">✕ DISCONNECTED</span>
        </div>
        <div class="p-2.5 bg-emerald-950/15 border border-emerald-900/30 rounded-lg flex flex-col">
          <span class="text-[7px] text-emerald-800 uppercase tracking-[0.2em]">HAM/Packet Radio</span>
          <span class="text-[9px] text-emerald-400 font-bold uppercase mt-0.5">✓ DECENTRALIZED LINK</span>
        </div>
      </div>

      <!-- Terminal Output -->
      <div class="flex-1 bg-black border border-emerald-900/20 rounded-lg p-3 text-[10px] overflow-y-auto relative">
        <div class="sticky top-0 bg-black/90 backdrop-blur pb-2 border-b border-emerald-900/20 mb-2 flex justify-between z-10">
          <span class="text-emerald-800 uppercase tracking-[0.2em] text-[7px]">AX.25 Packet Stream</span>
          <span class="text-[7px] text-emerald-500 animate-pulse">● REC</span>
        </div>
        <div id="terminal-content" class="space-y-2">
          <div class="text-emerald-800/50 italic">Awaiting radio burst...</div>
        </div>
      </div>

      <!-- S.C.L.I.D Directives (receives chat broadcasts) -->
      <div class="bg-emerald-950/10 border border-emerald-900/25 rounded-lg p-3 max-h-32 overflow-y-auto">
        <div class="text-[7px] text-emerald-700 uppercase tracking-[0.2em] mb-2">S.C.L.I.D AI DIRECTIVES</div>
        <div id="ai-directives" class="text-[9px] text-emerald-500/70 space-y-1">
          <div class="italic text-emerald-800">No directives received.</div>
        </div>
      </div>

      <!-- AR Compass -->
      <div id="ar-view" class="h-40 bg-black border border-emerald-900/15 rounded-xl relative overflow-hidden flex flex-col items-center justify-center opacity-25 transition-all duration-1000">
        <div class="absolute inset-0 flex items-center justify-center opacity-5">
          <svg viewBox="0 0 100 100" class="w-full h-full">
            <circle cx="50" cy="50" r="48" fill="none" stroke="currentColor" stroke-width="0.3" stroke-dasharray="1.5 1.5" />
            <circle cx="50" cy="50" r="35" fill="none" stroke="currentColor" stroke-width="0.2" stroke-dasharray="1 2" />
          </svg>
        </div>

        <svg viewBox="0 0 100 100" class="w-20 h-20 drop-shadow-[0_0_12px_currentColor]">
          <circle cx="50" cy="50" r="45" stroke="currentColor" fill="none" stroke-width="0.8" stroke-dasharray="3 3" class="opacity-15" />
          <circle cx="50" cy="50" r="30" stroke="currentColor" fill="none" stroke-width="0.5" stroke-dasharray="2 4" class="opacity-10" />
          <path id="compass-arrow" d="M 50 12 L 58 50 L 50 46 L 42 50 Z" fill="currentColor" transform="rotate(0 50 50)" class="transition-transform duration-1000" />
        </svg>

        <div class="mt-3 text-[9px] font-bold tracking-[0.15em] uppercase" id="compass-label">Awaiting Navigation Data</div>
      </div>
    </div>

    <!-- Field Chat Input -->
    <div class="mt-4 pt-3 border-t border-emerald-900/30">
      <div class="flex justify-between items-center mb-2 px-1">
        <span class="text-[7px] text-emerald-800 uppercase tracking-[0.15em]">VoiceSynth: ACTIVE</span>
        <span class="text-[7px] text-emerald-800 uppercase tracking-[0.15em]">Encryption: AES-256</span>
      </div>
      <div class="flex gap-2">
        <input type="text" id="field-chat-input" class="flex-1 bg-emerald-950/20 border border-emerald-900/50 rounded-lg px-3 py-2 text-[10px] text-emerald-400 placeholder-emerald-800 focus:outline-none focus:border-emerald-500/50" placeholder="Enter Field SOS / Report...">
        <button id="field-send-btn" class="px-4 bg-emerald-500 text-black font-black rounded-lg text-xs shadow-[0_0_15px_rgba(16,185,129,0.2)] active:scale-95 transition-all hover:brightness-110">
          TX
        </button>
      </div>
    </div>
  </div>

  <script src="story-client.js"></script>
  <script>
    const wsProtocol = window.location.protocol === 'https:' ? 'wss://' : 'ws://';
    const client = new StoryClient(wsProtocol + window.location.host);

    // Receive AI chat broadcasts in the directives panel
    client.onChatResponse = (response) => {
      const dir = document.getElementById('ai-directives');
      if (dir.querySelector('.italic')) dir.innerHTML = '';
      const entry = document.createElement('div');
      entry.className = 'text-emerald-400/80 border-l border-emerald-700/40 pl-2 animate-fade-in';
      entry.innerHTML = '<span class="text-[7px] text-emerald-600 block mb-0.5">S.C.L.I.D ' + new Date().toLocaleTimeString() + '</span>' + response.substring(0, 200);
      dir.appendChild(entry);
      dir.scrollTop = dir.scrollHeight;
    };

    client.onStateChange = (state) => {
      const ui = state.ui_state;
      const terminal = document.getElementById('terminal-content');

      // Terminal Log
      if (state.frameIndex > 0 && ui.ueb_log) {
        const entry = document.createElement('div');
        entry.className = 'animate-fade-in';
        entry.innerHTML = '<span class="text-emerald-800 mr-1">' + new Date().toLocaleTimeString() + ' ></span> <span class="text-emerald-300/80">' + ui.ueb_log + '</span>';
        terminal.appendChild(entry);
        terminal.parentElement.scrollTop = terminal.parentElement.scrollHeight;
      } else if (state.frameIndex === 0) {
        terminal.innerHTML = '<div class="text-emerald-800/50 italic">Awaiting radio burst...</div>';
      }

      // Dark Mode SOS injection at frame 6
      if (state.frameIndex === 6) {
        const sos = document.createElement('div');
        sos.className = 'text-red-400 font-bold animate-fade-in mt-2 p-2 border border-red-900/30 rounded bg-red-950/10';
        sos.innerHTML = '⚠ SOS DECODED — KB1ABC<br>MSG: "15 TRAPPED AT KRYPTON LIBRARY"<br>LOC: 42.36°N, -71.05°W<br>PRIORITY: ALPHA';
        if (!terminal.querySelector('.text-red-400')) terminal.appendChild(sos);
      }

      // AR Compass
      const isRescueActive = state.frameIndex >= 5;
      const arView = document.getElementById('ar-view');
      const arrow = document.getElementById('compass-arrow');
      const label = document.getElementById('compass-label');

      arView.style.opacity = isRescueActive ? '1' : '0.25';

      if (state.frameIndex === 6) {
        arrow.setAttribute('transform', 'rotate(-45 50 50)');
        arView.style.color = '#3B82F6';
        arView.className = arView.className.replace('border-emerald-900/15', 'border-blue-500/30');
        label.textContent = 'FINAL MILE → KRYPTON LIBRARY';
        label.className = 'mt-3 text-[9px] font-black text-blue-400 animate-pulse tracking-[0.1em] uppercase';
      } else if (isRescueActive) {
        arrow.setAttribute('transform', 'rotate(45 50 50)');
        arView.style.color = '#10B981';
        label.textContent = 'ROUTE DATA RECEIVED';
      } else {
        arrow.setAttribute('transform', 'rotate(0 50 50)');
        arView.style.color = '#10B981';
        label.textContent = 'Awaiting Navigation Data';
      }
    };

    // ── Field Chat Transmission ──
    const chatInput = document.getElementById('field-chat-input');
    const sendBtn = document.getElementById('field-send-btn');
    
    function sendFieldReport() {
      const text = chatInput.value.trim();
      if (!text) return;
      
      // Send to server
      client.sendChat("[FIELD REPORT] " + text);
      
      // Add local echo to directives panel
      const dir = document.getElementById('ai-directives');
      if (dir.querySelector('.italic')) dir.innerHTML = '';
      const entry = document.createElement('div');
      entry.className = 'text-emerald-500/50 border-l border-emerald-900/40 pl-2 text-right mb-2 mt-2 animate-fade-in';
      entry.innerHTML = '<span class="text-[7px] text-emerald-700 block mb-0.5">TX ' + new Date().toLocaleTimeString() + '</span>' + text;
      dir.appendChild(entry);
      dir.scrollTop = dir.scrollHeight;
      
      chatInput.value = '';
    }

    sendBtn.addEventListener('click', sendFieldReport);
    chatInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendFieldReport();
    });

    client.connect();
  </script>
</body>
</html>
