<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEXORA Field Marshall (Dark Mode)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-black text-nexora-success min-h-screen font-mono selection:bg-nexora-success selection:text-black">
  <!-- Scanline Overlay -->
  <div class="fixed inset-0 pointer-events-none z-50 bg-[linear-gradient(rgba(18,16,16,0)_50%,rgba(0,0,0,0.25)_50%),linear-gradient(90deg,rgba(255,0,0,0.06),rgba(0,255,0,0.02),rgba(0,0,118,0.06))] bg-[length:100%_2px,3px_100%] opacity-20"></div>

  <div class="h-full flex flex-col p-4 max-w-lg mx-auto border-x border-nexora-border">
    <header class="flex justify-between items-center mb-6 border-b border-nexora-border pb-4">
      <div>
        <div class="text-[10px] font-bold tracking-[0.3em] text-nexora-muted uppercase">TAC-UNIT / F-101</div>
        <div class="text-xs font-bold text-nexora-success">LOCATION: KRYPTON SECTOR 7</div>
      </div>
      <div id="statusDot" class="w-2 h-2 rounded-full bg-nexora-success shadow-[0_0_8px_#10B981] animate-pulse"></div>
    </header>

    <div class="flex-1 flex flex-col space-y-6 overflow-hidden">
       <!-- Offline Indicator -->
       <div class="grid grid-cols-2 gap-4">
          <div class="p-3 bg-red-950/20 border border-nexora-critical/30 rounded flex flex-col">
             <span class="text-[8px] text-nexora-muted uppercase tracking-widest">Cellular Uplink</span>
             <span class="text-[10px] text-nexora-critical font-bold uppercase mt-1">Status: Disconnected</span>
          </div>
          <div class="p-3 bg-green-950/20 border border-nexora-success/30 rounded flex flex-col">
             <span class="text-[8px] text-nexora-muted uppercase tracking-widest">HAM/Packet Node</span>
             <span class="text-[10px] text-nexora-success font-bold uppercase mt-1">Status: Linked (Decentralized)</span>
          </div>
       </div>

       <!-- Terminal Output -->
       <div class="flex-1 bg-slate-950/50 border border-nexora-border rounded p-4 text-xs overflow-y-auto space-y-3 relative group">
          <div class="sticky top-0 bg-slate-950/80 backdrop-blur py-1 border-b border-white/5 mb-2 flex justify-between">
             <span class="text-nexora-muted uppercase tracking-widest text-[8px]">AX.25 Packet Stream</span>
             <span class="text-[8px] text-nexora-success animate-pulse">REC...</span>
          </div>
          <div id="terminal-content" class="space-y-3">
             <div class="text-nexora-muted opacity-50 italic">Awaiting radio burst...</div>
          </div>
       </div>

       <!-- AR Compass Section -->
       <div id="ar-view" class="h-48 bg-slate-900/40 border border-nexora-border rounded-xl relative overflow-hidden flex flex-col items-center justify-center grayscale opacity-30 transition-all duration-1000">
          <div class="absolute inset-0 flex items-center justify-center opacity-10">
             <svg viewBox="0 0 100 100" class="w-full h-full">
                <circle cx="50" cy="50" r="48" fill="none" stroke="currentColor" stroke-width="0.5" stroke-dasharray="2 2" />
             </svg>
          </div>
          
          <svg viewBox="0 0 100 100" class="w-24 h-24 drop-shadow-[0_0_10px_currentColor]">
             <circle cx="50" cy="50" r="45" stroke="currentColor" fill="none" stroke-width="1" stroke-dasharray="4 4" class="opacity-20" />
             <path id="compass-arrow" d="M 50 10 L 60 50 L 50 45 L 40 50 Z" fill="currentColor" transform="rotate(0 50 50)" class="transition-transform duration-1000" />
          </svg>
          
          <div class="mt-4 text-[10px] font-bold tracking-[0.2em] uppercase" id="compass-label">Awaiting Navigation Data</div>
       </div>
    </div>

    <!-- PTT Button Area -->
    <div class="mt-6 pt-4 border-t border-nexora-border">
       <div class="flex justify-between items-center mb-4 px-2">
          <span class="text-[8px] text-nexora-muted uppercase">VoiceSynth Engine: ACTIVE</span>
          <span class="text-[8px] text-nexora-muted uppercase">Encryption: AES-256-DARK</span>
       </div>
       <button class="w-full py-6 bg-nexora-success text-black font-black rounded-xl text-lg shadow-[0_0_30px_rgba(16,185,129,0.3)] active:scale-95 transition-all transform hover:brightness-110">
          PUSH TO TALK (SOS)
       </button>
    </div>
  </div>

  <script src="story-client.js"></script>
  <script>
    const client = new StoryClient('ws://localhost:8080');
    
    client.onStateChange = (state) => {
      const uiState = state.ui_state;
      const terminal = document.getElementById('terminal-content');
      
      // Update Terminal Log
      if(state.frameIndex > 0 && uiState.ueb_log) {
        const entry = document.createElement('div');
        entry.className = 'animate-in fade-in slide-in-from-bottom-2 duration-300';
        entry.innerHTML = `<span class="text-[8px] text-nexora-muted mr-2">${new Date().toLocaleTimeString()}</span> <span class="text-white/80">></span> ${uiState.ueb_log}`;
        terminal.appendChild(entry);
        terminal.scrollTop = terminal.scrollHeight;
      } else if (state.frameIndex === 0) {
        terminal.innerHTML = '<div class="text-nexora-muted opacity-50 italic">Awaiting radio burst...</div>';
      }
      
      // Update AR View / Compass
      const isRescueActive = state.frameIndex >= 5;
      const arView = document.getElementById('ar-view');
      const arrow = document.getElementById('compass-arrow');
      const label = document.getElementById('compass-label');
      
      arView.style.opacity = isRescueActive ? '1' : '0.2';
      arView.style.filter = isRescueActive ? 'none' : 'grayscale(1)';
      arView.className = `h-48 border rounded-xl relative overflow-hidden flex flex-col items-center justify-center transition-all duration-1000 ${isRescueActive ? 'bg-green-500/5 border-nexora-success shadow-[inset_0_0_20px_rgba(16,185,129,0.1)]' : 'bg-slate-900/40 border-nexora-border'}`;
      
      if (state.frameIndex === 6) {
        arrow.setAttribute('transform', 'rotate(-45 50 50)');
        arrow.style.color = '#3B82F6'; // Agent Blue for Final Path
        label.textContent = 'FINAL MILE: KRYPTON LIBRARY';
        label.className = 'mt-4 text-[10px] font-black text-nexora-agent animate-pulse';
      } else if (isRescueActive) {
        arrow.setAttribute('transform', 'rotate(45 50 50)');
        arrow.style.color = '#10B981';
        label.textContent = 'ROUTE DATA RECEIVED';
      } else {
        arrow.setAttribute('transform', 'rotate(0 50 50)');
        arrow.style.color = 'currentColor';
        label.textContent = 'Awaiting Navigation Data';
      }
    };

    client.connect();
  </script>
</body>
</html>
