<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEXORA Logistics Organization</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-nexora-bg text-nexora-text h-screen overflow-hidden">
  <div class="h-full flex flex-col p-6">
    <header class="flex justify-between items-center mb-6">
      <div>
        <h1 class="text-2xl font-bold text-nexora-warning">LOGISTICS COMMAND</h1>
        <p class="text-nexora-muted text-sm tracking-widest">RESOURCE DISTRIBUTION & OPTIMIZATION</p>
      </div>
      <div id="statusDot" class="w-4 h-4 rounded-full bg-nexora-muted pulse-dot"></div>
    </header>

    <div class="flex-1 grid grid-cols-1 lg:grid-cols-4 gap-6 overflow-hidden">
       <!-- Side Panels -->
       <div class="space-y-6">
          <div class="card border-nexora-warning/30">
             <h2 class="text-xs font-bold text-nexora-muted uppercase mb-4">Inventory Status</h2>
             <div class="space-y-3">
                <div class="flex justify-between text-sm"><span>Potable Water</span> <span>12.4k units</span></div>
                <div class="flex justify-between text-sm"><span>Medical Kits</span> <span>890 units</span></div>
                <div class="flex justify-between text-sm"><span>Sandbags</span> <span class="text-nexora-warning">CRITICAL</span></div>
             </div>
          </div>
          
          <div class="card border-nexora-warning/30">
             <h2 class="text-xs font-bold text-nexora-muted uppercase mb-4">Transport Units</h2>
             <div class="flex items-center gap-3">
                <span class="text-3xl font-bold">18</span>
                <span class="text-[10px] text-nexora-muted">ACTIVE CONVOYS</span>
             </div>
          </div>
       </div>

       <!-- Main Map / Graph Section -->
       <div class="lg:col-span-2 bg-nexora-surface rounded-2xl border border-nexora-border relative">
          <div class="absolute top-4 left-4 z-20 glass-box px-4 py-2 text-xs font-bold uppercase tracking-widest text-nexora-warning">Live Supply Optimization</div>
          <div class="absolute inset-0 flex items-center justify-center p-8">
             <svg id="route-graph" viewBox="0 0 400 300" class="w-full h-full">
                <!-- Static Nodes -->
                <circle cx="50" cy="150" r="8" fill="var(--nexora-agent)" /> <!-- Depot -->
                <circle cx="200" cy="50" r="8" fill="var(--nexora-surface)" stroke="var(--nexora-border)" /> <!-- Pass -->
                <circle cx="350" cy="150" r="8" fill="var(--nexora-critical)" /> <!-- City -->
                <circle cx="200" cy="250" r="8" fill="var(--nexora-surface)" stroke="var(--nexora-border)" /> <!-- Trail -->
                
                <!-- Routes -->
                <path id="path-main" d="M 50 150 L 200 50 L 350 150" class="route-active" />
                <path id="path-alt" d="M 50 150 L 200 250 L 350 150" class="route-active opacity-10" />
                
                <!-- Obstacle -->
                <g id="landslide-marker" class="hidden">
                   <text x="190" y="45" fill="var(--nexora-critical)" font-size="20" font-weight="bold">X</text>
                   <text x="175" y="30" fill="var(--nexora-critical)" font-size="8">LANDSLIDE</text>
                </g>
             </svg>
          </div>
       </div>

       <!-- Right AI Panel -->
       <div class="space-y-6">
          <div class="card bg-slate-900 border-nexora-agent">
             <h2 class="text-xs font-bold text-nexora-agent uppercase mb-4">MiniMax Optimizer</h2>
             <div id="optimizer-status" class="text-sm font-mono space-y-2">
                <div class="text-nexora-muted">Awaiting Event...</div>
             </div>
          </div>
          
          <div class="card">
             <h2 class="text-xs font-bold text-nexora-muted uppercase mb-4">Optimal Path Metadata</h2>
             <div id="path-metadata" class="text-xs space-y-2 italic text-nexora-muted">
                Select route to view data.
             </div>
          </div>
       </div>
    </div>
  </div>

  <script src="story.js"></script>
  <script src="story-client.js"></script>
  <script>
    const client = new StoryClient('ws://localhost:8080');
    client.loadStory(THE_STORY);
    
    client.onFrameChange = (frameIndex) => {
      const frame = THE_STORY[frameIndex];
      const optStatus = document.getElementById('optimizer-status');
      const pathMeta = document.getElementById('path-metadata');
      
      // Update Map
      const isLandslide = frameIndex >= 2;
      const isOptimal = frameIndex >= 4;
      
      document.getElementById('landslide-marker').classList.toggle('hidden', !isLandslide);
      document.getElementById('path-main').className = isLandslide ? 'route-blocked' : 'route-active';
      document.getElementById('path-alt').classList.toggle('opacity-10', !isOptimal);
      document.getElementById('path-alt').className = isOptimal ? 'route-optimal' : 'route-active opacity-10';
      
      // Update Optimizer
      if (isLandslide && !isOptimal) {
        optStatus.innerHTML = '<div class="text-nexora-critical pulse-dot">> DETECTED BLOCKAGE. RECALCULATING...</div>';
      } else if (isOptimal) {
        optStatus.innerHTML = '<div class="text-nexora-success">> OPTIMIZATION COMPLETE</div><div class="text-white text-xs mt-2">ALGORITHM: A* Search<br>HEURISTIC: Euclidean<br>RESULT: Secondary Trail</div>';
        pathMeta.innerHTML = 'Route: Old Mine Trail<br>Distance: 12.4km<br>Risk Score: 14/100<br>ETA: 18m';
      }
    };
    
    client.onConnect = () => document.getElementById('statusDot').classList.add('bg-nexora-success');
    client.connect();
  </script>
</body>
</html>
