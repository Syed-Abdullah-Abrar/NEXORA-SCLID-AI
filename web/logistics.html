<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEXORA Logistics Organization</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-nexora-bg text-nexora-text min-h-screen">
  <div class="h-full flex flex-col p-6">
    <header class="flex justify-between items-center mb-6">
      <div>
        <h1 class="text-2xl font-bold text-nexora-warning tracking-tighter">LOGISTICS COMMAND</h1>
        <p class="text-nexora-muted text-[10px] tracking-[0.4em] uppercase">Resource Distribution & Optimization</p>
      </div>
      <div id="statusDot" class="w-4 h-4 rounded-full bg-nexora-muted pulse-dot"></div>
    </header>

    <div class="flex-1 grid grid-cols-1 lg:grid-cols-4 gap-6 overflow-hidden">
       <!-- Side Panels -->
       <div class="space-y-6">
          <div class="card border-nexora-warning/30 bg-amber-500/5">
             <h2 class="text-[10px] font-black text-nexora-muted uppercase tracking-widest mb-4">Inventory Status</h2>
             <div class="space-y-3">
                <div class="flex justify-between text-sm"><span>Potable Water</span> <span class="font-bold">12.4k units</span></div>
                <div class="flex justify-between text-sm"><span>Medical Kits</span> <span class="font-bold">890 units</span></div>
                <div class="flex justify-between text-sm"><span>Sandbags</span> <span class="text-nexora-warning font-black">CRITICAL</span></div>
             </div>
          </div>
          
          <div class="card border-nexora-warning/30">
             <h2 class="text-[10px] font-black text-nexora-muted uppercase tracking-widest mb-4">Transport Units</h2>
             <div class="flex items-center gap-3">
                <span class="text-4xl font-black" id="active-convoys">18</span>
                <span class="text-[10px] text-nexora-muted uppercase leading-none">Active<br>Convoys</span>
             </div>
          </div>
       </div>

       <!-- Main Map / Graph Section -->
       <div class="lg:col-span-2 bg-nexora-surface rounded-2xl border border-nexora-border relative shadow-inner overflow-hidden">
          <div class="absolute top-4 left-4 z-20 glass-box px-4 py-2 text-[10px] font-bold uppercase tracking-widest text-nexora-warning border border-nexora-warning/20">Live Supply Network</div>
          <div class="absolute inset-0 flex items-center justify-center p-8">
             <svg id="route-graph" viewBox="0 0 400 300" class="w-full h-full">
                <!-- Static Nodes -->
                <circle cx="50" cy="150" r="8" fill="var(--nexora-agent)" /> <!-- Depot -->
                <circle cx="200" cy="50" r="8" fill="var(--nexora-surface)" stroke="var(--nexora-border)" /> <!-- Pass -->
                <circle cx="350" cy="150" r="8" fill="var(--nexora-critical)" /> <!-- City -->
                <circle cx="200" cy="250" r="8" fill="var(--nexora-surface)" stroke="var(--nexora-border)" /> <!-- Trail -->
                
                <!-- Routes -->
                <path id="path-main" d="M 50 150 L 200 50 L 350 150" class="route-active" />
                <path id="path-alt" d="M 50 150 L 200 250 L 350 150" class="route-active opacity-10" />
                
                <!-- Obstacle -->
                <g id="landslide-marker" class="hidden">
                   <text x="185" y="45" fill="var(--nexora-critical)" font-size="24" font-weight="bold">×</text>
                   <text x="175" y="30" fill="var(--nexora-critical)" font-size="8" font-weight="bold" uppercase>BLOCKAGE</text>
                </g>
             </svg>
          </div>
       </div>

       <!-- Right AI Panel -->
       <div class="space-y-6 flex flex-col">
          <div class="card bg-slate-950 border-nexora-agent/50 flex-1">
             <h2 class="text-[10px] font-black text-nexora-agent uppercase tracking-widest mb-4">Minimax Optimizer</h2>
             <div id="optimizer-status" class="text-xs font-mono space-y-3">
                <div class="text-nexora-muted italic">Awaiting events...</div>
             </div>
          </div>
          
          <div class="card border-white/5 bg-white/5">
             <h2 class="text-[10px] font-black text-nexora-muted uppercase tracking-widest mb-4">Route Analytics</h2>
             <div id="path-metadata" class="text-xs space-y-2 font-medium text-nexora-muted">
                ---
             </div>
          </div>
       </div>
    </div>
  </div>

  <script src="story-client.js"></script>
  <script>
    const client = new StoryClient('ws://localhost:8080');
    
    client.onStateChange = (state) => {
      const uiState = state.ui_state;
      const optStatus = document.getElementById('optimizer-status');
      const pathMeta = document.getElementById('path-metadata');
      
      // Update Map
      const isLandslide = state.frameIndex >= 2;
      const isOptimal = state.frameIndex >= 4;
      
      document.getElementById('landslide-marker').classList.toggle('hidden', !isLandslide);
      document.getElementById('path-main').className = isLandslide ? 'route-blocked' : 'route-active';
      document.getElementById('path-alt').classList.toggle('opacity-10', !isOptimal);
      document.getElementById('path-alt').className = isOptimal ? 'route-optimal animate-pulse' : 'route-active opacity-10';
      
      // Update Convoys
      document.getElementById('active-convoys').textContent = isOptimal ? '24' : '18';

      // Update Optimizer UI
      if (isLandslide && !isOptimal) {
        optStatus.innerHTML = '<div class="text-nexora-critical animate-pulse">> OBSTACLE DETECTED: Highland Pass<br>> INITIATING REROUTE...</div>';
      } else if (isOptimal) {
        optStatus.innerHTML = `<div class="text-nexora-success font-bold">> OPTIMIZATION SUCCESSFUL</div>
                               <div class="text-white/70 text-[10px] mt-2 leading-loose">
                                 ALGORITHM: A* Search<br>
                                 HEURISTIC: Euclidean<br>
                                 NODES: 2,450 analyzed<br>
                                 RESULT: Secondary Trail Selected
                               </div>`;
        pathMeta.innerHTML = `<div class="flex justify-between"><span>NEW ETA:</span> <span class="text-white">-180m</span></div>
                              <div class="flex justify-between"><span>DISTANCE:</span> <span class="text-white">12.4km</span></div>
                              <div class="flex justify-between"><span>RISK SCORE:</span> <span class="text-nexora-success">14/100</span></div>`;
      } else {
        optStatus.innerHTML = '<div class="text-nexora-muted italic">Awaiting telemetry...</div>';
        pathMeta.innerHTML = '---';
      }
    };

    client.connect();
  </script>
</body>
</html>
