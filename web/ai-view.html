<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEXORA AI Orchestrator (Presenter)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css">
  <style>
    .neural-bg { background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%); }
    .status-badge { @apply px-2 py-1 rounded-md text-[10px] font-bold uppercase border; }
    .status-idle { @apply border-nexora-border text-nexora-muted bg-nexora-bg; }
    .status-processing { @apply border-nexora-agent text-nexora-agent bg-blue-500/10; }
    .status-complete { @apply border-nexora-success text-nexora-success bg-emerald-500/10; }
    .status-pending_approval { @apply border-nexora-warning text-nexora-warning bg-amber-500/10; }
  </style>
</head>
<body class="neural-bg text-nexora-text h-screen overflow-hidden flex flex-col p-6 font-sans">
  <header class="mb-8 flex justify-between items-end">
    <div>
      <h1 class="text-4xl font-black text-nexora-agent tracking-tighter">PROJECT NEXORA <span class="text-white font-light text-xl ml-2">PRESENTER</span></h1>
      <p class="text-nexora-muted uppercase text-xs tracking-[0.5em] mt-1">Autonomous Disaster Orchestration</p>
    </div>
    <div class="px-4 py-2 glass-box border border-nexora-success/30 text-nexora-success text-[10px] font-bold tracking-widest uppercase">
      KRYPTON DEPLOYMENT ACTIVE
    </div>
  </header>

  <div class="flex-1 grid grid-cols-1 lg:grid-cols-3 gap-8 overflow-hidden mb-24">
    <!-- UEB Log -->
    <div class="lg:col-span-2 flex flex-col space-y-4 overflow-hidden">
      <div class="text-[10px] font-bold text-nexora-agent uppercase tracking-widest">Unified Event Bus (UEB) Real-Time Stream</div>
      <div id="uebLog" class="flex-1 bg-black/50 border border-nexora-border rounded-xl p-6 font-mono text-sm overflow-y-auto space-y-3"></div>
    </div>

    <!-- Sidebar -->
    <div class="space-y-8">
      <!-- LLM Thought -->
      <div>
        <div class="text-[10px] font-bold text-nexora-warning uppercase tracking-widest mb-2">MiniMax MLLM Thought Process</div>
        <div class="bg-nexora-surface border border-nexora-warning/30 rounded-xl p-4 min-h-[140px] flex items-center justify-center">
           <div id="llm-process" class="text-sm italic text-center">Awaiting data burst...</div>
        </div>
      </div>

      <!-- Agent Grid -->
      <div>
        <div class="text-[10px] font-bold text-nexora-muted uppercase tracking-widest mb-3">Agent Pipeline Status</div>
        <div class="grid grid-cols-1 gap-3">
           <div class="flex justify-between items-center bg-nexora-bg/50 p-3 rounded-lg border border-nexora-border">
              <span class="text-xs font-medium">Early Warning Agent</span>
              <span id="ew-status" class="status-badge status-idle">IDLE</span>
           </div>
           <div class="flex justify-between items-center bg-nexora-bg/50 p-3 rounded-lg border border-nexora-border">
              <span class="text-xs font-medium">Situational Awareness</span>
              <span id="sa-status" class="status-badge status-idle">IDLE</span>
           </div>
           <div class="flex justify-between items-center bg-nexora-bg/50 p-3 rounded-lg border border-nexora-border">
              <span class="text-xs font-medium">Resource Allocation</span>
              <span id="ra-status" class="status-badge status-idle">IDLE</span>
           </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Presenter Bar -->
  <div class="fixed bottom-0 left-0 right-0 glass-box m-6 p-6 flex justify-between items-center border border-white/10 shadow-2xl">
    <div class="max-w-xl">
       <h2 id="frame-title" class="text-nexora-agent font-bold text-sm mb-1 uppercase tracking-widest">...</h2>
       <p id="presenterScript" class="text-white/80 text-base italic leading-relaxed">...</p>
    </div>
    <div class="flex items-center gap-6">
       <button onclick="controller.prevFrame()" id="prevBtn" class="px-6 py-3 bg-nexora-surface border border-nexora-border rounded-lg hover:bg-slate-700 font-bold transition-all disabled:opacity-30">← PREV</button>
       <div id="frameIndicator" class="text-3xl font-black font-mono w-24 text-center">00/00</div>
       <button onclick="controller.nextFrame()" id="nextBtn" class="px-10 py-4 bg-nexora-agent text-white rounded-xl hover:bg-blue-600 font-black shadow-[0_0_40px_rgba(59,130,246,0.3)] transform hover:scale-105 active:scale-95 transition-all">NEXT STEP →</button>
    </div>
  </div>

  <script src="story.js"></script>
  <script src="story-controller.js"></script>
  <script>
    const controller = new StoryController(window.THE_STORY);

    controller.onFrameChange = (frameIndex) => {
      const frame = window.THE_STORY[frameIndex];
      const state = frame.ui_state;

      // Header & Navigation
      document.getElementById('frame-title').textContent = frame.title;
      document.getElementById('presenterScript').textContent = frame.presenter_script;
      document.getElementById('frameIndicator').textContent = \`\${(frameIndex + 1).toString().padStart(2, '0')}/\${window.THE_STORY.length.toString().padStart(2, '0')}\`;
      document.getElementById('prevBtn').disabled = frameIndex === 0;
      document.getElementById('nextBtn').disabled = frameIndex === window.THE_STORY.length - 1;

      // UEB Log
      const uebLog = document.getElementById('uebLog');
      const logEntry = document.createElement('div');
      logEntry.className = 'p-3 bg-slate-900/80 border-l-2 border-nexora-agent rounded-r animate-in fade-in slide-in-from-left-4 duration-500';
      logEntry.innerHTML = \`<span class="text-nexora-muted text-xs mr-2">[\${new Date().toLocaleTimeString()}]</span> \${state.ueb_log}\`;
      uebLog.appendChild(logEntry);
      uebLog.scrollTop = uebLog.scrollHeight;

      // LLM Thought
      const llmBox = document.getElementById('llm-process');
      if (frameIndex === 1) llmBox.textContent = "QUERY: Analyze Silver River spike... RESULT: 92% match to 1998 Flood Pattern. ACTION: Issue Critical Warning.";
      else if (frameIndex === 4) llmBox.textContent = "REROUTING: A* Search initiated. OBSTACLE: Highland Pass. RESULT: Mountain Trail optimized. Time Saved: 180m.";
      else if (frameIndex === 0) llmBox.textContent = "IDLE. Awaiting mission objectives.";

      // Agent Status
      updateAgent('ew', state.agent_statuses.early_warning);
      updateAgent('sa', state.agent_statuses.situational);
      updateAgent('ra', state.agent_statuses.resource);
    };

    function updateAgent(id, status) {
      const el = document.getElementById(\`\${id}-status\`);
      el.className = 'status-badge status-' + status;
      el.textContent = status.replace('_', ' ');
    }

    // Initialize UI
    controller.goToFrame(controller.currentFrame);
  </script>
</body>
</html>
